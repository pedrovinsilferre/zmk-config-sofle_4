# ─────────────────────────────────────────────────────────────
# sofle.conf  —  SuperMini NRF52840 (nice_nano_v2 compat)
#               Zephyr 4.1 / ZMK main (2025-12)
# ─────────────────────────────────────────────────────────────

# Mouse / pointing
CONFIG_ZMK_POINTING=y

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_MAX_CONN=5

# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Display (OLED — ambos os lados)
CONFIG_ZMK_DISPLAY=y

# RGB Underglow
# NOTA: CONFIG_WS2812_STRIP=y foi REMOVIDO — no Zephyr 4.1 o driver é
# ativado automaticamente pelo devicetree (worldsemi,ws2812-spi).
CONFIG_ZMK_RGB_UNDERGLOW=y

# EXT_POWER: desativado até o nó ext-power ser adicionado ao overlay.
# Para reativar, adicione o nó ext_power no sofle.overlay e mude para =y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Backlight (PWM)
CONFIG_ZMK_BACKLIGHT=n
