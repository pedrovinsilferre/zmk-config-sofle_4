# Mouse (necessário para &mmv, &mkp, &msc)
CONFIG_ZMK_POINTING=y

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_MAX_CONN=5

# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Ativa suporte a display OLED
CONFIG_ZMK_DISPLAY=y

# Biblioteca gráfica necessária para os widgets do ZMK
#CONFIG_LVGL=y
#CONFIG_LVGL_THEME_DEFAULT=y
