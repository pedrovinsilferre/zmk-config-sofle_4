# ─────────────────────────────────────────────────────────────
# sofle.conf  —  SuperMini NRF52840 (nice_nano_v2 compat)
#               Zephyr 4.1 / ZMK main (2025-12)
#               DEEP SLEEP + AUTO RECONNECT
# ─────────────────────────────────────────────────────────────

# Mouse / pointing
CONFIG_ZMK_POINTING=y

# Bluetooth - SPLIT MODE
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_PAIRED=2
CONFIG_BT_MAX_CONN=2
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# ===== DEEP SLEEP CONFIGURATION =====
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_PM_DEVICE=y

# ===== POWER MANAGEMENT =====
CONFIG_ZMK_EXT_POWER=y

# ===== BLE STABILITY DURING SLEEP =====
CONFIG_BT_GATT_DYN_DB=y

# Display (OLED — ambos os lados)
CONFIG_ZMK_DISPLAY=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y

# EXT_POWER
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Backlight (PWM)
CONFIG_ZMK_BACKLIGHT=n
