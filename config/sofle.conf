# ─────────────────────────────────────────────────────────────
# sofle.conf  —  SuperMini NRF52840 (nice_nano_v2 compat)
#               Zephyr 4.1 / ZMK main (2025-12)
#               OTIMIZADO PARA LINUX + ANDROID
# ─────────────────────────────────────────────────────────────

# Mouse / pointing
CONFIG_ZMK_POINTING=y

# ===== BLUETOOTH - CONFIGURAÇÃO CRÍTICA PARA LINUX =====
CONFIG_ZMK_BLE=y

# Reduzir para 1 conexão ativa (CRÍTICO para estabilidade!)
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2

# ===== CONNECTION INTERVAL - Compatibilidade com BlueZ =====
# Intervalo mínimo: 10 = 12.5ms (ao invés de 6 = 7.5ms que é agressivo)
# Intervalo máximo: 3200 = 4 segundos
CONFIG_BT_CTLR_CONN_INTERVAL_MIN=10
CONFIG_BT_CTLR_CONN_INTERVAL_MAX=3200

# Preferências de intervalo para o periférico (teclado)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24      # 30ms (menos agressivo que 7.5ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=100     # 125ms
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0       # Sem latência
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=200     # 2 segundos de timeout

# ===== MTU Configuration - Melhor performance =====
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# ===== HID Configuration - CRÍTICO para reconhecimento =====
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y
CONFIG_BT_GATT_CHRC_INDICATE_MAX=2
CONFIG_BT_GATT_DYN_DB=y

# ===== SLEEP Configuration =====
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000    # 5 minutos (ao invés de 15)

# Display (OLED — ambos os lados)
CONFIG_ZMK_DISPLAY=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Backlight (PWM)
CONFIG_ZMK_BACKLIGHT=n

# ===== DEBUG (descomente se tiver problemas) =====
# CONFIG_BT_DEBUG_LOG=y
# CONFIG_ZMK_LOG_LEVEL_DEBUG=y
