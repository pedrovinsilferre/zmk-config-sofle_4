# Configuração do shield Sofle (Sofle Choc RGB, PandaKB)
# Habilita os recursos usados no keymap

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Backlight (LEDs de switch, se sua versão tiver)
CONFIG_ZMK_BACKLIGHT=y

# Bluetooth: número de perfis (combina com os BT_SEL 0-3 do keymap = 4 perfis)
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_MAX_CONN=5

# Sleep / economia de energia (ajuste se notar muito consumo de bateria)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Mouse (necessário para os bindings &mmv, &mkp, &msc da camada Mouse)
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE_ACCEL=y
