name: Build ZMK firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v2025.02
    with:
      board: nice_nano                     
      shield: sofle_left                   

  build_right:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v2025.02
    with:
      board: nice_nano
      shield: sofle_right
